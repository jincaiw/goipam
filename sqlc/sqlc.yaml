version: "2"
sql:
  - engine: "mysql"
    queries: "queries/"
    schema: "../migrations/mysql/"
    gen:
      go:
        package: "sqlc"
        out: "../internal/db/sqlc"
        sql_package: "database/sql"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: true
        emit_exact_table_names: false
        emit_empty_slices: true
        overrides:
          - db_type: "varbinary(16)"
            go_type:
              type: "[]byte"
          - db_type: "tinyint_unsigned"
            go_type: "uint8"
          - db_type: "tinyint(1)"
            go_type: "bool"
